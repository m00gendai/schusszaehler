<html>
    <head>
        <link href="styles.css" rel="stylesheet" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
    </head>
    <body>
        <div id="content"></div>

        <div class="divider"></div>

        <div class="dash">
            <div class="dash_container">
                <div class="dash_container_inner">
                    <p id="shotsTest_p"><strong>Probe:</strong></p>
                    <div class="shotRow" id="shotsTest">
                        <div class="shotMock" id="shotMockshotsTest"></div>
                    </div>
                </div>
                <div class="dash_container_inner">
                    <p id="shotsSingle_p"><strong>Einzel:</strong></p>
                    <div class="shotRow" id="shotsSingle">
                        <div class="shotMock" id="shotMockshotsSingle"></div>
                    </div>
                </div>
            </div>
            <div class="dash_container">
                <div class="dash_container_inner">
                    <p id="shotsRapid1_p"><strong>Serie 1:</strong></p>
                    <div class="shotRow" id="shotsRapid1">
                        <div class="shotMock" id="shotMockshotsRapid1"></div>
                    </div>
                </div>
                <div class="dash_container_inner">
                    <p id="shotsRapid2_p"><strong>Serie 2:</strong></p>
                    <div class="shotRow" id="shotsRapid2">
                        <div class="shotMock" id="shotMockshotsRapid2"></div>
                    </div>
                </div>
            </div>
            <p><strong>Total:</strong></p>
            <div id="total"></div>
        </div>

        <div class="divider"></div>

        <div class="resetContainer">
            <button id="reset">Neues Programm</button>
            <!-- <button id="reload">Programm wiederherstellen</button> -->
        </div>
        <footer></footer>
        <dialog>
            <div class="dialog_content">
                <span><p>Schuss anpassen</p></span>
                <span><input type="number" id="newValue" min="1" max="10" /></span>
                <span><button class="close">OK</button></span>
            </div>
        </dialog>
        <script src="script.js"></script>
    </body>
</html>
